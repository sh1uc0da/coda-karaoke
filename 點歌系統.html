<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>詩雨蔻達 · 點歌系統</title>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f5ede0"/>
  <g transform="translate(100 100)" fill="#c9b896" opacity="0.5">
    <circle cx="-6" cy="6" r="7"/>
    <rect x="0" y="-18" width="2.5" height="24"/>
  </g>
</svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    zoom: 1.25;
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.4; }
  }
  @keyframes pulseSoft {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.4); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(3deg); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .song-scroll::-webkit-scrollbar { width: 6px; }
  .song-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  .tab-content { animation: fadeSlide 0.3s ease; }
  @media (max-width: 820px) {
    .viewer-home { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/theme.jsx"></script>
<script type="text/babel" src="src/ViewerHome.jsx"></script>
<script type="text/babel" src="src/Tabs.jsx"></script>
<script type="text/babel" src="src/StageAdmin.jsx"></script>
<script type="text/babel" src="src/Admin.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const APP_TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "fresh",
  "density": "normal",
  "showBrand": true
}/*EDITMODE-END*/;

function App() {
  const { THEMES, Icon, patternBg } = window.KaraokeTheme;
  const D = window.KaraokeData;

  const [tweaks, setTweaks] = useState(APP_TWEAKS);
  const [tweaksOn, setTweaksOn] = useState(false);
  const [route, setRoute] = useState(() => localStorage.getItem("coda-route") || "home");
  const [adminOpen, setAdminOpen] = useState(false);
  // Admin button is gated by ?admin=1 in the URL. Share the bare URL with viewers;
  // open ?admin=1 yourself to access the backend.
  const adminEnabled = typeof window !== "undefined" && /[?&]admin=1\b/.test(window.location.search);

  const [songs, setSongs]       = useState(D.INITIAL_SONGS);
  const [queue, setQueue]       = useState(D.INITIAL_QUEUE);
  const [history, setHistory]   = useState(D.INITIAL_HISTORY);
  const [current, setCurrent]   = useState(D.CURRENT_PLAYING);
  const [donations, setDonations] = useState(D.INITIAL_DONATIONS);
  const [parser, setParser]     = useState(D.INITIAL_PARSER);
  const [queueSubtitle, setQueueSubtitle] = useState(
    () => localStorage.getItem("coda-queue-subtitle") || "點歌依照斗內時間順序排列，遇到 ≥ $500 會優先插隊 ♪"
  );

  useEffect(() => { localStorage.setItem("coda-queue-subtitle", queueSubtitle); }, [queueSubtitle]);

  const theme = THEMES[tweaks.theme] || THEMES.fresh;

  useEffect(() => { localStorage.setItem("coda-route", route); }, [route]);

  // Auto-sync history.length → coda-stage-state.totalSongs and push to OBS overlay window.
  // Also deduct 5 MP per newly completed song.
  // This runs at App level so the sync happens regardless of which tab is active.
  useEffect(() => {
    const STAGE_KEY = "coda-stage-state";
    try {
      const raw = localStorage.getItem(STAGE_KEY);
      const cur = raw ? JSON.parse(raw) : {};
      const prevTotal = cur.totalSongs || 0;
      if (prevTotal !== history.length) {
        const delta = history.length - prevTotal;
        const next = { ...cur, totalSongs: history.length };
        // Only deduct MP when songs were ADDED (not when history is reduced/reset)
        if (delta > 0 && typeof cur.mp === "number" && typeof cur.mpMax === "number") {
          next.mp = Math.max(0, cur.mp - 5 * delta);
        }
        localStorage.setItem(STAGE_KEY, JSON.stringify(next));
        // Broadcast to same-origin listeners
        try {
          if (typeof BroadcastChannel !== "undefined") {
            const bc = window.__codaStageChannelApp || (window.__codaStageChannelApp = new BroadcastChannel("coda-stage"));
            bc.postMessage(next);
          }
        } catch(_) {}
        // Push to overlay window (handles cross-origin preview iframe → new tab case)
        const w = window.__codaOverlayWin;
        if (w && !w.closed) {
          try { w.postMessage({ type: "coda-stage-state", state: next }, "*"); } catch(_) {}
        }
      }
    } catch(_) {}
  }, [history.length]);

  // Listen for overlay-ready handshake at App level too, so the overlay always gets state
  // even if StageAdmin tab isn't mounted.
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data && e.data.type === "coda-stage-ready") {
        window.__codaOverlayWin = e.source;
        try {
          const raw = localStorage.getItem("coda-stage-state");
          const cur = raw ? JSON.parse(raw) : {};
          const next = { ...cur, totalSongs: history.length };
          e.source.postMessage({ type: "coda-stage-state", state: next }, "*");
        } catch(_) {}
      }
    };
    window.addEventListener("message", onMsg);
    return () => window.removeEventListener("message", onMsg);
  }, [history.length]);

  // Tweaks host protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOn(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateTweak = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  const routes = [
    { id: "home",    label: "主頁",       icon: <Icon.Home s={16}/> },
    { id: "queue",   label: "排隊序列",   icon: <Icon.Queue s={16}/> },
    { id: "history", label: "歷史紀錄",   icon: <Icon.History s={16}/> },
  ];

  return (
    <div style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: theme.bg,
      backgroundImage: patternBg(theme),
      color: theme.ink,
      display: "flex", flexDirection: "column",
      overflow: "hidden",
    }}>
      {/* top navbar */}
      <div style={{
        display: "flex", alignItems: "center",
        padding: "14px 24px",
        borderBottom: `1px solid ${theme.border}`,
        background: theme.card,
        backdropFilter: theme.pattern === "drops" ? "blur(14px)" : "none",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 44, height: 44, borderRadius: "50%",
            overflow: "hidden",
            border: `2px solid ${theme.accent}66`,
            flex: "0 0 auto",
            background: theme.bg,
          }}>
            <img src="assets/coda_avatar_head.jpg" alt="詩雨蔻達"
              style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}/>
          </div>
          <div>
            <div style={{
              fontFamily: "'Noto Serif TC', serif",
              fontSize: 18, fontWeight: 700, color: theme.ink, letterSpacing: 1,
              lineHeight: 1,
            }}>詩雨蔻達</div>
            <div style={{
              fontSize: 10, color: theme.sub, letterSpacing: 3,
              fontFamily: "JetBrains Mono, monospace", marginTop: 2,
            }}>SHIU CODA · 點歌系統</div>
          </div>
        </div>

        <div style={{ flex: 1 }}/>

        {/* route tabs */}
        <div style={{
          display: "flex", gap: 4,
          background: theme.bg, padding: 4, borderRadius: 12,
          border: `1px solid ${theme.border}`,
        }}>
          {routes.map(r => (
            <button key={r.id} onClick={()=>setRoute(r.id)} style={{
              display: "flex", alignItems: "center", gap: 6,
              padding: "8px 14px", borderRadius: 9,
              background: route === r.id ? theme.card : "transparent",
              color: route === r.id ? theme.ink : theme.sub,
              border: "none", cursor: "pointer",
              fontSize: 13, fontWeight: route === r.id ? 600 : 500,
              boxShadow: route === r.id ? "0 1px 3px rgba(0,0,0,0.06)" : "none",
              transition: "all 0.15s",
            }}>
              {r.icon}{r.label}
            </button>
          ))}
        </div>

        <div style={{ flex: 1 }}/>

        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 6,
            padding: "5px 10px", borderRadius: 999,
            background: theme.live + "22",
            color: theme.live,
            fontSize: 11, fontWeight: 700, letterSpacing: 1.5,
          }}>
            <span style={{
              display: "inline-block", width: 6, height: 6, borderRadius: "50%",
              background: theme.live, animation: "pulse 1.6s infinite",
            }}/>
            LIVE
          </div>
          {adminEnabled && (
            <button onClick={()=>setAdminOpen(true)} style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              background: theme.ink, color: theme.card === "#fff8e8" ? theme.card : "#fff",
              border: "none", padding: "8px 14px", borderRadius: 10,
              fontSize: 12, fontWeight: 600, cursor: "pointer",
            }}>
              <Icon.Settings s={13}/> 後台
            </button>
          )}
        </div>
      </div>

      {/* route content */}
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }} key={route} className="tab-content">
        {route === "home"    && <ViewerHome theme={theme} songs={songs} queue={queue} history={history} current={current} density={tweaks.density}/>}
        {route === "queue"   && <QueueTab   theme={theme} queue={queue} history={history} songs={songs} current={current} queueSubtitle={queueSubtitle}/>}
        {route === "history" && <HistoryTab theme={theme} history={history} songs={songs}/>}
      </div>

      {adminOpen && (
        <AdminPanel
          theme={theme}
          songs={songs} setSongs={setSongs}
          queue={queue} setQueue={setQueue}
          history={history} setHistory={setHistory}
          current={current} setCurrent={setCurrent}
          donations={donations} setDonations={setDonations}
          parser={parser} setParser={setParser}
          queueSubtitle={queueSubtitle} setQueueSubtitle={setQueueSubtitle}
          onClose={()=>setAdminOpen(false)}
        />
      )}

      {/* Tweaks panel */}
      {tweaksOn && (
        <div style={{
          position: "fixed", bottom: 20, right: 20, zIndex: 200,
          width: 280, background: theme.card,
          border: `1px solid ${theme.border}`,
          borderRadius: 16, padding: 18,
          boxShadow: "0 12px 40px rgba(0,0,0,0.15)",
          backdropFilter: "blur(10px)",
        }}>
          <div style={{ fontFamily: "'Noto Serif TC', serif", fontSize: 15, fontWeight: 600, marginBottom: 12, color: theme.ink }}>
            Tweaks
          </div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: theme.sub, marginBottom: 6, letterSpacing: 1 }}>視覺風格</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {Object.entries(THEMES).map(([k, t]) => (
                <button key={k} onClick={()=>updateTweak({ theme: k })} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 10px", borderRadius: 8,
                  background: tweaks.theme === k ? theme.accent + "33" : "transparent",
                  border: `1px solid ${tweaks.theme === k ? theme.accent : theme.border}`,
                  color: theme.ink, cursor: "pointer", fontSize: 13,
                  textAlign: "left",
                }}>
                  <div style={{ display: "flex", gap: 2 }}>
                    <span style={{ width: 14, height: 14, borderRadius: 3, background: t.accent }}/>
                    <span style={{ width: 14, height: 14, borderRadius: 3, background: t.accent2 }}/>
                    <span style={{ width: 14, height: 14, borderRadius: 3, background: t.accent3 }}/>
                  </div>
                  {t.name}
                </button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 11, color: theme.sub, marginBottom: 6, letterSpacing: 1 }}>歌單密度</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[["tight","緊湊"],["normal","標準"]].map(([k,l]) => (
                <button key={k} onClick={()=>updateTweak({ density: k })} style={{
                  flex: 1, padding: "6px 10px", borderRadius: 8,
                  background: tweaks.density === k ? theme.accent : "transparent",
                  color: tweaks.density === k ? "#fff" : theme.ink,
                  border: `1px solid ${tweaks.density === k ? theme.accent : theme.border}`,
                  cursor: "pointer", fontSize: 12,
                }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
