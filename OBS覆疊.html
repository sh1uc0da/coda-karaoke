<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>詩雨蔻達 · OBS 舞台覆疊</title>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#f5f3ea"/>
  <rect x="40" y="80" width="120" height="10" rx="5" fill="#d97a6c"/>
  <rect x="40" y="100" width="90" height="10" rx="5" fill="#8fb88a"/>
</svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
  body {
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #3a4a3a;
    overflow: hidden;
  }
  /* Solid bg only when ?bg=1 (for previewing); OBS Browser Source uses transparent default */
  body.with-bg {
    background:
      radial-gradient(circle at 20% 0%, rgba(143,184,138,0.18), transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(184,212,207,0.2), transparent 50%),
      #f5f3ea;
  }
  body.with-bg::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 12% 28%, rgba(217,211,191,0.4) 1px, transparent 1.5px),
      radial-gradient(circle at 78% 64%, rgba(217,211,191,0.3) 1px, transparent 1.5px),
      radial-gradient(circle at 42% 88%, rgba(217,211,191,0.35) 1px, transparent 1.5px);
    background-size: 280px 240px, 320px 300px, 240px 260px;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes pulseSoft { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes ding {
    0% { transform: scale(0.7) rotate(-8deg); opacity: 0; }
    20% { transform: scale(1.08) rotate(2deg); opacity: 1; }
    80% { transform: scale(1) rotate(0); opacity: 1; }
    100% { transform: translateY(-30px) scale(0.9); opacity: 0; }
  }
  @keyframes barFill { from { width: 0; } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// keep in sync with src/StageAdmin.jsx
const STAGES = [
  { min: 0,   max: 20,         title: "街頭藝人" },
  { min: 21,  max: 50,         title: "駐唱歌手" },
  { min: 51,  max: 100,        title: "音樂人" },
  { min: 101, max: 150,        title: "知名音樂人" },
  { min: 151, max: Infinity,   title: "宇宙歌姬" },
];
const getStage = (n) => STAGES.find(s => n >= s.min && n <= s.max) || STAGES[STAGES.length-1];

const STAGE_KEY = "coda-stage-state";
const DEFAULT = {
  hp: 120, hpMax: 120, mp: 100, mpMax: 100,
  totalSongs: 0, manualTitle: null,
};

// Match theme tokens from src/theme.jsx (fresh)
const T = {
  bg: "#f5f3ea", bg2: "#ebe6d6", card: "#fffdf6",
  ink: "#3a4a3a", sub: "#6d7865",
  accent: "#8fb88a", accent2: "#b8d4cf", accent3: "#e8b87a",
  live: "#d97a6c", border: "#d9d3bf",
};

function useStageStateMirror() {
  const [s, setS] = useState(() => {
    try {
      const raw = localStorage.getItem(STAGE_KEY);
      if (raw) return { ...DEFAULT, ...JSON.parse(raw) };
    } catch(_) {}
    return DEFAULT;
  });
  useEffect(() => {
    const read = () => {
      try {
        const raw = localStorage.getItem(STAGE_KEY);
        if (raw) setS({ ...DEFAULT, ...JSON.parse(raw) });
      } catch(_) {}
    };
    // Cross-tab via storage event
    const onStorage = (e) => { if (e.key === STAGE_KEY) read(); };
    window.addEventListener("storage", onStorage);
    // Cross-window via BroadcastChannel (faster, cross-iframe-safe)
    let bc = null;
    try {
      if (typeof BroadcastChannel !== "undefined") {
        bc = new BroadcastChannel("coda-stage");
        bc.onmessage = (e) => { if (e.data) setS({ ...DEFAULT, ...e.data }); };
      }
    } catch(_) {}
    // Cross-origin via postMessage from opener (handles preview-iframe → new-window case)
    const onMsg = (e) => {
      if (e.data && e.data.type === "coda-stage-state" && e.data.state) {
        setS({ ...DEFAULT, ...e.data.state });
      }
    };
    window.addEventListener("message", onMsg);
    // Announce readiness to opener so it can push state immediately
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: "coda-stage-ready" }, "*");
      }
    } catch(_) {}
    // Polling fallback (same-origin only)
    const id = setInterval(read, 500);
    return () => {
      window.removeEventListener("storage", onStorage);
      window.removeEventListener("message", onMsg);
      clearInterval(id);
      if (bc) bc.close();
    };
  }, []);
  return s;
}

function Bar({ label, value, max, fill, mark }) {
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "baseline",
        marginBottom: 4,
      }}>
        <span style={{
          fontFamily: "JetBrains Mono, monospace",
          fontSize: 13, fontWeight: 700, color: mark, letterSpacing: 2,
        }}>{label}</span>
        <span style={{
          fontFamily: "JetBrains Mono, monospace",
          fontSize: 14, fontWeight: 700, color: T.ink,
        }}>{value}<span style={{ color: T.sub, fontSize: 11, fontWeight: 500 }}> / {max}</span></span>
      </div>
      <div style={{
        height: 14, background: T.bg2,
        border: `1px solid ${T.border}`,
        borderRadius: 99, overflow: "hidden",
        position: "relative",
        boxShadow: "inset 0 1px 2px rgba(0,0,0,0.08)",
      }}>
        <div style={{
          width: `${pct}%`, height: "100%",
          background: fill,
          borderRadius: 99,
          transition: "width 0.6s cubic-bezier(.4,1.6,.4,1)",
          boxShadow: `0 0 8px ${mark}55`,
          position: "relative",
          overflow: "hidden",
        }}>
          <div style={{
            position: "absolute", inset: 0,
            background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent)",
            backgroundSize: "200% 100%",
            animation: "shimmer 2.4s infinite",
          }}/>
        </div>
      </div>
    </div>
  );
}

function App() {
  const s = useStageStateMirror();
  const [bursts, setBursts] = useState([]);
  const prevRef = useRef(s);

  // Detect changes → spawn a floating "+N HP" / "+N MP" badge
  useEffect(() => {
    const prev = prevRef.current;
    const dHp = s.hp - prev.hp;
    const dMp = s.mp - prev.mp;
    const dSongs = s.totalSongs - prev.totalSongs;
    const newBursts = [];
    if (dHp > 0) newBursts.push({ id: Math.random(), text: `+${dHp} HP`, color: T.live });
    if (dMp > 0) newBursts.push({ id: Math.random(), text: `+${dMp} MP`, color: T.accent });
    if (dSongs > 0) newBursts.push({ id: Math.random(), text: `♪ ${dSongs > 1 ? `+${dSongs}` : "完成 1 首"}`, color: T.accent3 });
    if (newBursts.length) {
      setBursts(b => [...b, ...newBursts]);
      newBursts.forEach(nb => {
        setTimeout(() => setBursts(b => b.filter(x => x.id !== nb.id)), 2200);
      });
    }
    prevRef.current = s;
  }, [s.hp, s.mp, s.totalSongs]);

  // Toggle preview bg via ?bg=1
  useEffect(() => {
    if (/[?&]bg=1\b/.test(window.location.search)) document.body.classList.add("with-bg");
  }, []);

  const stage = getStage(s.totalSongs);
  const title = s.manualTitle || stage.title;
  const nextDiff = stage.max === Infinity ? null : (stage.max + 1) - s.totalSongs;

  return (
    <div style={{
      position: "fixed", top: 24, left: 24,
      width: 360,
      zIndex: 1,
    }}>
      <div style={{
        background: T.card,
        border: `1px solid ${T.border}`,
        borderRadius: 18,
        padding: "16px 18px 14px",
        boxShadow: "0 8px 32px rgba(58,74,58,0.18), 0 1px 0 rgba(255,255,255,0.6) inset",
        position: "relative",
      }}>
        {/* Title bar */}
        <div style={{
          display: "flex", alignItems: "center", gap: 10,
          paddingBottom: 12,
          borderBottom: `1px dashed ${T.border}`,
          marginBottom: 12,
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: "50%",
            background: T.bg,
            border: `2px solid ${T.accent}88`,
            overflow: "hidden", flex: "0 0 auto",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: "'Noto Serif TC', serif",
            fontWeight: 700, color: T.accent,
          }}>
            <img src="assets/coda_avatar_head.jpg" alt=""
              onError={(e)=>{ e.target.style.display="none"; }}
              style={{ width: "100%", height: "100%", objectFit: "cover" }}/>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{
              fontFamily: "'Noto Serif TC', serif",
              fontSize: 17, fontWeight: 700, color: T.ink,
              letterSpacing: 1, lineHeight: 1.1,
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            }}>{title}</div>
            <div style={{
              fontSize: 10, color: T.sub, letterSpacing: 2,
              fontFamily: "JetBrains Mono, monospace", marginTop: 3,
            }}>SHIU CODA · LV.{s.totalSongs}</div>
          </div>
          <div style={{
            display: "flex", alignItems: "center", gap: 5,
            padding: "4px 9px", borderRadius: 99,
            background: T.live + "1f",
            color: T.live, fontSize: 10, fontWeight: 700, letterSpacing: 1.5,
          }}>
            <span style={{
              width: 5, height: 5, borderRadius: "50%",
              background: T.live, animation: "pulseSoft 1.4s infinite",
            }}/>
            LIVE
          </div>
        </div>

        {/* Bars */}
        <Bar label="HP" value={s.hp} max={s.hpMax}
             fill={`linear-gradient(90deg, ${T.live}, ${T.accent3})`}
             mark={T.live}/>
        <Bar label="MP" value={s.mp} max={s.mpMax}
             fill={`linear-gradient(90deg, ${T.accent2}, ${T.accent})`}
             mark={T.accent}/>

        {/* Floating bursts */}
        <div style={{
          position: "absolute", top: 20, right: 20,
          display: "flex", flexDirection: "column", gap: 6,
          alignItems: "flex-end", pointerEvents: "none",
        }}>
          {bursts.map(b => (
            <div key={b.id} style={{
              padding: "5px 12px", borderRadius: 99,
              background: T.card,
              border: `2px solid ${b.color}`,
              color: b.color, fontWeight: 800,
              fontFamily: "JetBrains Mono, monospace",
              fontSize: 13, letterSpacing: 1,
              boxShadow: `0 4px 12px ${b.color}44`,
              animation: "ding 2.2s ease forwards",
              whiteSpace: "nowrap",
            }}>{b.text}</div>
          ))}
        </div>
      </div>

      {/* Stats card — separate frame */}
      <div style={{
        marginTop: 10,
        background: T.card,
        border: `1px solid ${T.border}`,
        borderRadius: 18,
        padding: "12px 16px",
        boxShadow: "0 8px 32px rgba(58,74,58,0.18), 0 1px 0 rgba(255,255,255,0.6) inset",
        display: "flex", alignItems: "center", gap: 12,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontSize: 10, color: T.sub, letterSpacing: 2,
            fontFamily: "JetBrains Mono, monospace", marginBottom: 4,
          }}>累積已唱</div>
          <div style={{
            fontFamily: "'Noto Serif TC', serif",
            fontSize: 22, fontWeight: 700, color: T.ink,
            lineHeight: 1,
          }}>
            {s.totalSongs}<span style={{ fontSize: 13, color: T.sub, fontWeight: 500, marginLeft: 4 }}>首</span>
          </div>
        </div>
        <div style={{ width: 1, alignSelf: "stretch", background: T.border }}/>
        <div style={{ flex: 1, minWidth: 0, textAlign: "right" }}>
          <div style={{
            fontSize: 10, color: T.sub, letterSpacing: 2,
            fontFamily: "JetBrains Mono, monospace", marginBottom: 4,
          }}>{nextDiff !== null ? "距離下一階段" : "★ 最高階段"}</div>
          <div style={{
            fontFamily: "'Noto Serif TC', serif",
            fontSize: 22, fontWeight: 700,
            color: nextDiff !== null ? T.accent : T.accent3,
            lineHeight: 1,
          }}>
            {nextDiff !== null
              ? <>{nextDiff}<span style={{ fontSize: 13, color: T.sub, fontWeight: 500, marginLeft: 4 }}>首</span></>
              : "✦"}
          </div>
        </div>
      </div>

      {/* tiny help footer (hidden in OBS, shown in preview) */}
      <div style={{
        marginTop: 10, fontSize: 10, color: T.sub,
        fontFamily: "JetBrains Mono, monospace",
        letterSpacing: 1, textAlign: "center",
        opacity: document.body.classList.contains("with-bg") ? 1 : 0.5,
      }}>
        OBS 來源請啟用「自訂CSS · body{`{background:transparent}`}」&nbsp;·&nbsp;同步自點歌系統後台
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

// Show bg by default when not in OBS, so the user can see it during preview
if (!/[?&]bg=0\b/.test(window.location.search)) {
  document.body.classList.add("with-bg");
}
</script>
</body>
</html>
